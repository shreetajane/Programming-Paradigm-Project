<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L&F Portal | Campus Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-link.active { background: #6366f1; color: white; box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <aside class="w-80 border-r border-white/5 bg-[#0b1120] p-8 hidden lg:flex flex-col sticky top-0 h-screen">
            <div class="mb-12 px-2">
                <span class="text-2xl font-black tracking-tighter text-white uppercase italic">L&F Portal</span>
            </div>
            
            <nav class="flex flex-col gap-3">
                <button onclick="switchTab('report-tab')" id="nav-report" class="sidebar-link active flex items-center gap-4 px-6 py-4 rounded-2xl text-sm font-bold transition-all">
                    <span>➕</span> Report an Item
                </button>
                <button onclick="switchTab('search-tab')" id="nav-search" class="sidebar-link flex items-center gap-4 px-6 py-4 rounded-2xl text-sm font-bold transition-all text-slate-400 hover:bg-white/5">
                    <span>🔍</span> View Registry
                </button>
            </nav>

            <div class="mt-auto p-6 rounded-[2rem] bg-indigo-500/5 border border-indigo-500/10">
                <p id="user-display" class="text-xs truncate font-medium opacity-60">Checking access...</p>
                <button id="signout-button" class="mt-4 text-[10px] font-bold text-red-400 hover:underline uppercase tracking-widest">Logout</button>
            </div>
        </aside>

        <main class="flex-1 p-8 lg:p-16 overflow-y-auto">
            
            <section id="login-container" class="max-w-md mx-auto mt-20 p-12 rounded-[3rem] glass-panel shadow-2xl">
                <h2 class="text-3xl font-bold mb-8 text-white text-center tracking-tight">Portal Login</h2>
                <div class="space-y-4">
                    <input type="email" id="email-input" placeholder="College Email" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none focus:border-indigo-500 transition-all">
                    <input type="password" id="password-input" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none focus:border-indigo-500 transition-all">
                    <button id="signin-button" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-black text-white shadow-lg transition-all uppercase tracking-widest">Login</button>
                </div>
            </section>

            <section id="report-tab" class="tab-content active max-w-5xl">
                <header class="mb-12">
                    <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">Post New Entry</h1>
                    <p class="text-slate-400 font-medium">Add details of the lost or found item to the registry.</p>
                </header>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" id="item-name-input" placeholder="Item Name (e.g. Blue Wallet)" class="w-full bg-slate-800 border border-white/5 p-5 rounded-2xl focus:border-indigo-500 outline-none">
                            <input type="text" id="item-location-input" placeholder="Location Found/Lost" class="w-full bg-slate-800 border border-white/5 p-5 rounded-2xl focus:border-indigo-500 outline-none">
                        </div>
                        <textarea id="item-description-input" rows="5" placeholder="Any unique identifiers (scratches, stickers, contents)..." class="w-full bg-slate-800 border border-white/5 p-5 rounded-2xl focus:border-indigo-500 outline-none resize-none"></textarea>
                    </div>

                    <div class="flex flex-col gap-6">
                        <div class="flex-1 border-2 border-dashed border-white/10 rounded-[2rem] flex flex-col items-center justify-center p-10 bg-white/[0.01] hover:bg-indigo-500/5 transition-all cursor-pointer group" onclick="document.getElementById('item-image-input').click()">
                            <input type="file" id="item-image-input" class="hidden" accept="image/*">
                            <span class="text-3xl mb-4 group-hover:scale-110 transition-transform">📸</span>
                            <p class="font-bold text-white text-sm uppercase tracking-widest opacity-60">Upload Image</p>
                            <div id="file-chosen" class="mt-4 text-indigo-400 text-[10px] font-mono truncate max-w-full italic"></div>
                        </div>
                        <button id="add-item-button" class="bg-white text-slate-900 py-6 rounded-2xl font-black text-lg hover:bg-indigo-400 hover:text-white transition-all uppercase shadow-xl">Post to Registry</button>
                    </div>
                </div>
            </section>

            <section id="search-tab" class="tab-content">
                <div class="flex flex-col md:flex-row justify-between items-end gap-8 mb-12">
                    <div>
                        <h2 class="text-4xl font-extrabold text-white mb-2 tracking-tight">Item Registry</h2>
                        <p class="text-slate-500 font-medium italic">Showing all active records on campus.</p>
                    </div>
                    <div class="bg-slate-800 p-2 rounded-2xl border border-white/5 w-full md:w-80 shadow-inner">
                        <input type="text" id="search-input" oninput="fetchLostItems(this.value)" placeholder="Search by name..." class="bg-transparent w-full px-4 py-3 outline-none text-sm font-medium">
                    </div>
                </div>
                <div id="lost-items-display">
                    <ul class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></ul>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="xyz.js"></script>
</body>
</html>
